name: Build ADS CV

on:
  workflow_dispatch:
  schedule:
    - cron: "37 13 * * *"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r src/requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Generate ADS-backed TeX fragments
        env:
          ADS_DEV_KEY: ${{ secrets.ADS_DEV_KEY }}
        run: python src/generate_cv.py

      - name: Build PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: latex/academic_cv.tex

      - name: Save PDF
        run: |
          mkdir -p compiled
          cp academic_cv.pdf compiled/academic_cv.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: academic-cv
          path: compiled/academic_cv.pdf
